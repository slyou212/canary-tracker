<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>image-bigo-dounite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TikTok-style top bar */
    .topbar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .topbar .back { font-size: 22px; cursor: pointer; }
    .topbar .title { font-size: 16px; font-weight: 600; }
    .topbar .more { font-size: 22px; }

    /* Image container */
    .img-wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
      background: #111;
      aspect-ratio: 9/16;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Fake blurred image background */
    .img-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 40%, #1a0533 100%);
      filter: blur(0px);
    }
    /* Silhouette shape */
    .img-silhouette {
      position: relative;
      z-index: 1;
      filter: blur(18px) brightness(0.4);
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse at 50% 40%, #c084fc 0%, #818cf8 40%, transparent 70%);
      border-radius: 50%;
    }
    /* Lock overlay */
    .lock-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(2px);
    }
    .lock-icon { font-size: 44px; margin-bottom: 10px; }
    .lock-text { font-size: 15px; color: #ddd; margin-bottom: 6px; font-weight: 500; }
    .lock-sub { font-size: 12px; color: #aaa; text-align: center; padding: 0 32px; }

    /* Bottom panel */
    .bottom {
      width: 100%;
      max-width: 480px;
      padding: 16px;
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #ec4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }
    .username { font-size: 14px; font-weight: 600; }
    .follow-btn {
      margin-left: auto;
      border: 1px solid #fff;
      border-radius: 4px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #fff;
    }
    .caption { font-size: 13px; color: #ccc; margin-bottom: 16px; line-height: 1.5; }
    .caption strong { color: #fff; }

    .unlock-btn {
